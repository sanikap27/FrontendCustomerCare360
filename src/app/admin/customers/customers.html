<div class="container">
  <h2>Customers</h2>

  <div class="form-row">
    <input type="number" 
           [ngModel]="form().userId" 
           (ngModelChange)="updateField('userId', $event)" 
           placeholder="User ID">

           <!-- <select [(ngModel)]="form().userId" name="userId">
<option value="" disabled>Select User ID</option>
<option *ngFor="let u of users" [value]="u.userId">
   {{ u.userId }} -{{u.name}}
</option>
</select> -->
      <select
           [ngModel]="form().customerType" 
           (ngModelChange)="updateField('customerType', $event)" 
           placeholder="Customer Type">
            <option value="" disabled selected>Select CustomerType</option>
           <option value="Active">Residential</option>
      <option value="Inactive">Commercial</option>
         <option value="Inactive">Industrial</option>
  </select>
    
    <input type="text" 
           [ngModel]="form().contactInfo" 
           (ngModelChange)="updateField('contactInfo', $event)" 
           placeholder="Contact Info">
    <select
   
           [ngModel]="form().status" 
           (ngModelChange)="updateField('status', $event)" 
           placeholder="Status">
           <option value="" disabled selected>Select Status</option>
           <option value="Active">Active</option>
      <option value="Inactive">Inactive</option>
  </select>
    
    <button class="add-btn" (click)="saveCustomer()">
      {{ isEdit() ? 'Update' : 'Add' }}
    </button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>User ID</th>
        <th>Type</th>
        <th>Contact</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (c of customers(); track c.customerId) {
        <tr>
          <td>{{ c.customerId }}</td>
          <td>{{ c.userId }}</td>
          <td>{{ c.customerType }}</td>
          <td>{{ c.contactInfo }}</td>
          <td [ngClass]="c.status.toLowerCase() === 'active' ? 'active' : 'inactive'">
            {{ c.status }}
          </td>
          <td>
            <button class="edit-btn" (click)="editCustomer(c)">Edit</button>
            <button class="delete-btn" (click)="deleteCustomer(c.customerId)">Delete</button>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="6" style="text-align: center; padding: 20px;">
            No customers found.
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
