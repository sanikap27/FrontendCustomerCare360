<div class="card">
<h2>Premises</h2>
<!-- Form -->
<div class="form-row">
<input [(ngModel)]="newPremise.address" placeholder="Address">
<input [(ngModel)]="newPremise.region" placeholder="Region">
<input [(ngModel)]="newPremise.meterId" placeholder="Meter ID">
<select [(ngModel)]="newPremise.status">
<option>Energized</option>
<option>Disconnected</option>
</select>
<button class="btn-add" (click)="addPremise()">+ Add</button>
</div>
<!-- Table -->
<table class="table">
<thead>
<tr>
<th>ID</th>
<th>Address</th>
<th>Region</th>
<th>Meter</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody>
<tr *ngFor="let p of premises">
<td>{{p.premiseId}}</td>
<td>{{p.address}}</td>
<td>{{p.region}}</td>
<td>{{p.meterId}}</td>
<td>
<span class="status" [ngClass]="p.status.toLowerCase()">

            {{p.status}}
</span>
</td>
<td>
<button class="btn-delete" (click)="deletePremise(p.premiseId)">

            Delete
</button>
</td>
</tr>
</tbody>
</table>
</div>
