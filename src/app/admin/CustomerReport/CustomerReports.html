<div class="card">
  <h2>Customer Reports</h2>

  <div class="form">
    <select [ngModel]="newReport().scope" (ngModelChange)="updateFormField('scope', $event)">
      <option value="">Select Scope</option>
      <option value="Period">Period</option>
      <option value="Region">Region</option>
      <option value="Service Type">Service Type</option>
    </select>

    <select [ngModel]="newReport().metrics" (ngModelChange)="updateFormField('metrics', $event)">
      <option value="">Select Metrics</option>
      <option value="AvgResolutionTime">AvgResolutionTime</option>
      <option value="BillAdjustmentRate">BillAdjustmentRate</option>
      <option value="ComplaintsVolume">ComplaintsVolume</option>
    </select>

    <input type="date" [ngModel]="newReport().generatedDate" (ngModelChange)="updateFormField('generatedDate', $event)" />

    <button class="btn-add" (click)="addReport()">
      Generate Report
    </button>
  </div>

  <div class="table-container">
    <table class="table-custom">
      <thead>
        <tr>
          <th>ID</th>
          <th>Scope</th>
          <th>Metrics</th>
          <th>Generated Date</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        @for (r of reports(); track r.customerReportId) {
          <tr>
            <td>{{ r.customerReportId }}</td>
            <td>{{ r.scope }}</td>
            <td>{{ r.metrics }}</td>
            <td>{{ r.generatedDate | date:'shortDate' }}</td>
            <td>
              <button class="btn-delete" (click)="deleteReport(r.customerReportId)">
                Delete
              </button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="5" class="text-center">No reports generated yet.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
