<div class="card">
<h2>Customer Reports</h2>
<!-- FORM -->
<div class="form">
<!-- Scope Dropdown -->
<select [(ngModel)]="newReport.scope">
<option value="">Select Scope</option>
<option value="Period">Period</option>
<option value="Region">Region </option>
<option value="Service Type">Service Type</option>
</select>
<!-- Metrics Dropdown -->
<select [(ngModel)]="newReport.metrics">
<option value="">Select Metrics</option>
<option value="AvgResolutionTime">AvgResolutionTime</option>
<option value="BillAdjustmentRate">BillAdjustmentRate</option>
<option value="ComplaintsVolume">ComplaintsVolume</option>
</select>
<!-- Date -->
<input type="date" [(ngModel)]="newReport.generatedDate" />
<!-- Button -->
<button class="btn-add" (click)="addReport()">

      Generate Report
</button>
</div>
<!-- TABLE -->
<table class="table-custom">
<thead>
<tr>
<th>ID</th>
<th>Scope</th>
<th>Metrics</th>
<th>Generated Date</th>
<th>Action</th>
</tr>
</thead>
<tbody>
<tr *ngFor="let r of reports">
<td>{{ r.customerReportId }}</td>
<td>{{ r.scope }}</td>
<td>{{ r.metrics }}</td>
<td>{{ r.generatedDate | date:'shortDate' }}</td>
<td>
<button class="btn-delete"

            (click)="deleteReport(r.customerReportId)">

            Delete
</button>
</td>
</tr>
</tbody>
</table>
</div>
