<div class="card">
<h2>Service Accounts</h2>
<!-- Form -->
<div class="form-row">
<input [(ngModel)]="newAccount.customerId" placeholder="Customer ID">
<input [(ngModel)]="newAccount.serviceType" placeholder="Service Type">
<input type="date" [(ngModel)]="newAccount.startDate">
<input type="date" [(ngModel)]="newAccount.endDate">
<select [(ngModel)]="newAccount.status">
<option>Active</option>
<option>Inactive</option>
<option>Suspended</option>
</select>
<button class="btn-add" (click)="addAccount()">+ Add</button>
</div>
<!-- Table -->
<table class="table">
<thead>
<tr>
<th>ID</th>
<th>Customer</th>
<th>Type</th>
<th>Start Date</th>
<th>End Date</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody>
<tr *ngFor="let a of accounts">
<td>{{a.serviceAccountId}}</td>
<td>{{a.customerId}}</td>
<td>{{a.serviceType}}</td>
<td>{{a.startDate | date:'shortDate'}}</td>
<td>{{a.endDate | date:'shortDate'}}</td>
<td>
<span class="status" [ngClass]="a.status.toLowerCase()">

            {{a.status}}
</span>
</td>
<td>
<button class="btn-delete" (click)="deleteAccount(a.serviceAccountId)">

            Delete
</button>
</td>
</tr>
</tbody>
</table>
</div>
