<div class="card">
  <h2>Bills</h2>
  <table class="table-custom">
    <thead>
      <tr>
        <th>Bill ID</th>
        <th>Service Account</th>
        <th>Billing Cycle</th>
        <th>Usage</th>
        <th>Amount</th>
        <th>Due Date</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      @for (b of bills(); track b.billId) {
        <tr>
          <td>{{ b.billId }}</td>
          <td>{{ b.serviceAccountId }}</td>
          <td>{{ b.billingCycleId }}</td>
          <td>{{ b.usage }}</td>
          <td>₹ {{ b.amount }}</td>
          <td>{{ b.dueDate | date:'shortDate' }}</td>
          <td>
            <span [ngClass]="{
                  'Generated': b.status === 'Generated',
                  'Adjusted': b.status === 'Adjusted',
                  'Closed': b.status === 'Closed'
                }">
              {{ b.status }}
            </span>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="7" style="text-align: center; padding: 20px;">
            No bills found in the system.
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
