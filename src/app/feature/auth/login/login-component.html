<!-- Main Content -->
<div class="container text-center mt-5">
<h1 class="fw-bold">All Your Utility Services in One Place</h1>
<p class="text-muted mt-3">

    Manage your water, electricity, and gas services easily in one unified platform.
</p>
<!-- Login Card -->
<div class="card shadow-lg mx-auto mt-4 p-4"

       style="max-width: 400px; border-radius: 12px;">
<!-- ✅ IMPORTANT: formGroup -->
<form [formGroup]="form" (ngSubmit)="onLogin()">
<!-- Email -->
<input

        type="email"

        class="form-control mb-3"

        placeholder="Email"

        formControlName="email"

      />
<!-- Password -->
<input

        type="password"

        class="form-control mb-3"

        placeholder="Password"

        formControlName="password"

      />
<!-- Button -->
<button

        type="submit"

        class="btn w-100 text-white"

        style="background-color:#0d0f11;">

        Login
</button>
</form>
<!-- Register Link -->
<p class="mt-3">

      Don't have an account?
<a [routerLink]="['/register']">Register</a>
</p>
</div>
</div>
