<h2>Complaints</h2>
<table>
<thead>
<tr>
<th>ID</th>
<th>Customer</th>
<th>Category</th>
<th>Description</th>
<th>Status</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>
<tbody>
<tr *ngFor="let c of complaints">
<td>{{ c.complaintId }}</td>
<td>{{ c.customerId }}</td>
<td>{{ c.category }}</td>
<td>{{ c.description }}</td>
<td>{{ c.status }}</td>
<td>{{ c.loggedDate | date:'short' }}</td>
<td>
<button (click)="editComplaint(c)">Edit</button>
</td>
</tr>
</tbody>
</table>
<!-- EDIT FORM -->
<div *ngIf="selectedComplaint" class="edit-box">
<h3>Edit Complaint</h3>
<input [(ngModel)]="selectedComplaint.category" placeholder="Category">
<input [(ngModel)]="selectedComplaint.description" placeholder="Description">
<input [(ngModel)]="selectedComplaint.status" placeholder="Status">
<button (click)="updateComplaint()">Update</button>
