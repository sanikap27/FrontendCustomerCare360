<h2>Service Orders</h2>
<table class="table">
<thead>
<tr>
<th>ID</th>
<th>Account</th>
<th>Premise</th>
<th>Type</th>
<th>Status</th>
<th>Scheduled</th>
<th>Action</th>
</tr>
</thead>
<tbody>
<tr *ngFor="let o of orders()">
<td>{{ o.serviceOrderId }}</td>
<td>{{ o.serviceAccountId }}</td>
<td>{{ o.premiseId }}</td>
<td>{{ o.orderType }}</td>
<td>{{ o.status }}</td>
<td>{{ o.scheduledDate | date:'short' }}</td>
<td>
<button (click)="editOrder(o)">Edit</button>
</td>
</tr>
</tbody>
</table>
<h3>Add Service Order</h3>
<div class="form">
<input [(ngModel)]="newOrder.serviceAccountId" placeholder="Service Account ID">
<input [(ngModel)]="newOrder.premiseId" placeholder="Premise ID">
<input [(ngModel)]="newOrder.orderType" placeholder="Order Type">
<input [(ngModel)]="newOrder.scheduledDate" type="date">
<select [(ngModel)]="newOrder.status">
<option>Pending</option>
<option>InProgress</option>
<option>Completed</option>
</select>
 
<button (click)="addOrder()">Add</button>
</div>
 
<!-- EDIT FORM -->
<div *ngIf="selectedOrder()" class="form">
<h3>Edit Order</h3>
<input [(ngModel)]="selectedOrder().orderType" placeholder="Type">
<input [(ngModel)]="selectedOrder().status" placeholder="Status">
<select [(ngModel)]="newOrder.status">
<option>Pending</option>
<option>InProgress</option>
<option>Completed</option>
</select>
 
<button (click)="updateOrder()">Update</button>
</div>
